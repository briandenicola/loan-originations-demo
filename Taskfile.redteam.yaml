version: "3"

vars:
  REDTEAM_DIR: ./src/redteam
  VENV_DIR: ./src/redteam/.venv

tasks:
  setup:
    desc: Install Red Team Agent dependencies
    cmds:
      - python -m venv {{.VENV_DIR}}
      - "{{.VENV_DIR}}/Scripts/pip install -r {{.REDTEAM_DIR}}/requirements.txt"
    status:
      - test -d {{.VENV_DIR}}

  run:
    desc: Run AI Red Teaming against all Loan Origination agents
    deps: [setup]
    cmds:
      - "{{.VENV_DIR}}/Scripts/python {{.REDTEAM_DIR}}/run_redteam.py"
    env:
      PROJECT_ENDPOINT:
        sh: terraform -chdir=./infrastructure output -raw FOUNDRY_NEXTGEN_ENDPOINT 2>/dev/null || echo ""

  clean:
    desc: Remove Red Team virtual environment
    cmds:
      - powershell -NoProfile -Command "Remove-Item -Recurse -Force {{.VENV_DIR}} -ErrorAction SilentlyContinue"
