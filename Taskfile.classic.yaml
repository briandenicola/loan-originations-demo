version: "3"

dotenv: 
  - .env

vars:
  ENDPOINT_POINT: FOUNDRY_ENDPOINT

tasks:
  default:
    cmds:
      - task --list

  agents:
    desc: Initializes AI agents in Microsoft Foundry
    dir: ./src/classic/agent_init
    cmds:
      - dotnet run -- --endpoint={{.FOUNDRY_ENDPOINT}}
    vars:
      FOUNDRY_ENDPOINT:
        sh: terraform -chdir=../../infrastructure output -raw {{.ENDPOINT_POINT}}

  build:
    desc: Builds the .NET web application
    dir: ./src/classic/
    cmds:
      - dotnet build

  run:
    desc: Runs the {{.TITLE}} web application on port {{.APP_PORT}}
    dir: ./src/classic/
    cmds:
      - dotnet run --urls "http://localhost:{{.APP_PORT}}"


  clean:
    desc: Cleans build artifacts
    cmds:
      - cmd: Remove-Item -Recurse -Force src/classic/bin, src/classic/obj -ErrorAction SilentlyContinue
      - cmd: Remove-Item -Recurse -Force src/classicagent_init/bin, src/classic/agent_init/obj -ErrorAction SilentlyContinue

  docker-build:
    desc: Builds Docker container for {{.TITLE}}
    dir: ./src/classic/
    cmds:
      - docker build -t loan-origination:{{.COMMIT_VERSION}} -t loan-origination:classic .
    vars:
      COMMIT_VERSION:
        sh: git rev-parse HEAD | cut -c 1-8

  docker-run:
    desc: Runs the Docker container locally
    cmds:
      - docker run --rm -p {{.APP_PORT}}:8080
        -e AZURE_TENANT_ID=$AZURE_TENANT_ID
        -e AZURE_CLIENT_ID=$AZURE_CLIENT_ID
        -e AZURE_CLIENT_SECRET=$AZURE_CLIENT_SECRET
        loan-origination:classic