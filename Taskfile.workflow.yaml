version: "3"

vars:
  ENDPOINT_POINT: FOUNDRY_NEXTGEN_ENDPOINT
  APP_PORT: 8082
  
tasks:
  default:
    cmds:
      - task --list

  agents:
    desc: Initializes AI agents in Microsoft Foundry
    dir: ./src/workflow/agent_init
    cmds:
      - dotnet run -- --endpoint={{.FOUNDRY_ENDPOINT}}
    vars:
      FOUNDRY_ENDPOINT:
        sh: terraform -chdir=../../../infrastructure output -raw {{.ENDPOINT_POINT}}

  build:
    desc: Builds the .NET web application
    dir: ./src/workflow/
    cmds:
      - dotnet build

  run:
    desc: Runs the {{.TITLE}} web application on port {{.APP_PORT}}
    dir: ./src/workflow/
    cmds:
      - dotnet run --urls "http://localhost:{{.APP_PORT}}"


  clean:
    desc: Cleans build artifacts
    cmds:
      - cmd: Remove-Item -Recurse -Force src/workflow/bin, src/workflow/obj -ErrorAction SilentlyContinue
      - cmd: Remove-Item -Recurse -Force src/workflowagent_init/bin, src/workflow/agent_init/obj -ErrorAction SilentlyContinue

  docker-build:
    desc: Builds Docker container for {{.TITLE}}
    cmds:
      - docker build -f src/workflow/Dockerfile -t loan-origination:{{.COMMIT_VERSION}} -t loan-origination:workflow .
    vars:
      COMMIT_VERSION:
        sh: git rev-parse HEAD | cut -c 1-8

  acr-build:
    desc: Builds container in ACR for {{.TITLE}} workflow agent
    cmds:
      - az acr build -r {{.ACR_NAME}} -t loan-origination-workflow:{{.COMMIT_VERSION}} -t loan-origination-workflow:latest -f src/workflow/Dockerfile .
    vars:
      COMMIT_VERSION:
        sh: git rev-parse HEAD | cut -c 1-8
      ACR_NAME:
        sh: terraform -chdir=./infrastructure output -raw ACR_NAME

  docker-run:
    desc: Runs the Docker container locally
    cmds:
      - docker run --rm -p {{.APP_PORT}}:8080
        -e AZURE_TENANT_ID=$AZURE_TENANT_ID
        -e AZURE_CLIENT_ID=$AZURE_CLIENT_ID
        -e AZURE_CLIENT_SECRET=$AZURE_CLIENT_SECRET
        loan-origination:workflow